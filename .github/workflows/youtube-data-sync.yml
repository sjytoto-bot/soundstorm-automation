name: YouTube Data Sync

on:
  schedule:
    # 듀얼 cron — throttle 확률 분산 (:00/:30 + :15/:45)
    - cron: "*/30 * * * *"
    - cron: "15 * * * *"
  push:
    branches:
      - main   # paths 필터 제거 — main push 시 항상 실행
  workflow_dispatch:
    inputs:
      trigger_source:
        description: 'cron or dispatch'
        default: 'dispatch'

env:
  PYTHON_VERSION: "3.11"
  TRIGGER_SOURCE: ${{ github.event.inputs.trigger_source || 'cron' }}

permissions:
  contents: read
  issues: write   # 실패 시 GitHub Issue 자동 생성용

jobs:
  sync-youtube-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15   # 재시도 3회 포함 여유

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 메인 실행 (재시도 3회, 30초 간격) ────────────────────────────────────
      - name: Run API Data Shuttler (retry 3x)
        id: sync
        env:
          SERVICE_ACCOUNT_B64: ${{ secrets.SERVICE_ACCOUNT_B64 }}
          CLIENT_SECRET_B64:   ${{ secrets.CLIENT_SECRET_B64 }}
          GOOGLE_TOKEN_B64:    ${{ secrets.GOOGLE_TOKEN_B64 }}
          GOOGLE_SHEETS_ID:    ${{ secrets.GOOGLE_SHEETS_ID }}
        run: |
          EXIT_CODE=0
          for attempt in 1 2 3; do
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "▶ 실행 시도 $attempt / 3"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            if python 07_AUTOMATION_자동화/scripts_스크립트/api_data_shuttler.py; then
              echo "✅ 동기화 성공 (시도 $attempt)"
              EXIT_CODE=0
              break
            else
              EXIT_CODE=$?
              if [ $attempt -lt 3 ]; then
                echo "⚠️ 실패 (종료코드 $EXIT_CODE) — 30초 후 재시도..."
                sleep 30
              else
                echo "❌ 3회 모두 실패 (종료코드 $EXIT_CODE)"
              fi
            fi
          done
          exit $EXIT_CODE

      # ── 토큰 갱신 감지 → GOOGLE_TOKEN_B64 자동 업데이트 ──────────────────────
      # REPO_PAT 설정 방법:
      #   GitHub → Settings → Developer Settings → Personal Access Tokens (Classic)
      #   → repo 스코프 체크 → 생성 후 이 저장소 Secrets에 REPO_PAT로 저장
      - name: Auto-update refreshed token Secret
        if: success()
        env:
          REPO_PAT: ${{ secrets.REPO_PAT }}
        run: |
          if [ ! -f /tmp/soundstorm_creds/token_was_refreshed ]; then
            echo "ℹ️  토큰 갱신 없음 — Secret 업데이트 스킵"
            exit 0
          fi

          echo "🔄 OAuth 토큰이 갱신됨 감지"

          if [ -z "$REPO_PAT" ]; then
            echo "⚠️  REPO_PAT Secret이 없어 자동 업데이트 불가"
            echo "   → 아래 Issue에서 수동 업데이트 안내 확인"
            echo "token_needs_manual_update=true" >> $GITHUB_ENV
            exit 0
          fi

          # gh CLI로 Secret 자동 업데이트
          export GH_TOKEN="$REPO_PAT"
          cat /tmp/soundstorm_creds/token_refreshed.b64 | \
            gh secret set GOOGLE_TOKEN_B64 \
              --repo ${{ github.repository }}
          echo "✅ GOOGLE_TOKEN_B64 Secret 자동 업데이트 완료"
          echo "token_auto_updated=true" >> $GITHUB_ENV

      # ── 토큰 수동 갱신 안내 Issue (REPO_PAT 미설정 시) ──────────────────────
      - name: Create token update reminder
        if: success() && env.token_needs_manual_update == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh issue list \
            --repo ${{ github.repository }} \
            --label "token-refresh" \
            --state open --limit 1 --json number \
            --jq '.[0].number // empty')
          if [ -z "$EXISTING" ]; then
            gh issue create \
              --repo ${{ github.repository }} \
              --title "🔑 OAuth 토큰 갱신됨 — GOOGLE_TOKEN_B64 수동 업데이트 필요" \
              --body "## 토큰 갱신 감지

          이번 실행에서 OAuth 토큰이 자동 갱신됐습니다.
          REPO_PAT Secret이 없어 자동 업데이트를 건너뜠습니다.

          ## 지금 바로 처리

          \`\`\`bash
          # 로컬에서 실행
          python 07_AUTOMATION_자동화/scripts_스크립트/export_secrets.py --push
          \`\`\`

          또는 수동으로:
          1. \`base64 -i /tmp/soundstorm_creds/token.pickle | pbcopy\`
          2. GitHub → Settings → Secrets → \`GOOGLE_TOKEN_B64\` 업데이트

          ## 영구 자동화 (권장)

          \`REPO_PAT\` Secret을 등록하면 다음부터 자동으로 업데이트됩니다:
          1. GitHub → Settings → Developer Settings → Personal Access Tokens (Classic)
          2. \`repo\` 스코프 체크 후 생성
          3. 이 저장소 Secrets에 \`REPO_PAT\` 이름으로 저장

          **Run ID**: ${{ github.run_id }}" \
              --label "token-refresh"
          fi

      # ── 성공 시 기존 실패 이슈 클로징 ────────────────────────────────────────
      - name: Close failure issues on success
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for label in "sync-failure" "token-refresh"; do
            EXISTING=$(gh issue list \
              --repo ${{ github.repository }} \
              --label "$label" \
              --state open --limit 1 --json number \
              --jq '.[0].number // empty')
            if [ -n "$EXISTING" ]; then
              gh issue close "$EXISTING" \
                --repo ${{ github.repository }} \
                --comment "✅ 동기화 정상 복구 — Run ID: ${{ github.run_id }}"
              echo "  이슈 #$EXISTING 클로징 완료 (label: $label)"
            fi
          done

      # ── 실패 진단 ─────────────────────────────────────────────────────────────
      - name: Diagnose failure
        if: failure()
        run: |
          echo "════════════════════════════════════════"
          echo "🔍 실패 진단"
          echo "════════════════════════════════════════"

          # 인증 파일 존재 여부
          echo "── 인증 파일 상태:"
          for f in service_account.json client_secret.json token.pickle; do
            if [ -f /tmp/soundstorm_creds/$f ]; then
              echo "  ✅ $f 존재 ($(stat -c%s /tmp/soundstorm_creds/$f 2>/dev/null || stat -f%z /tmp/soundstorm_creds/$f 2>/dev/null) bytes)"
            else
              echo "  ❌ $f 없음 — 환경변수 누락 또는 base64 오류"
            fi
          done

          # 환경변수 설정 여부 (값 노출 없이)
          echo "── 환경변수 설정 여부:"
          for var in SERVICE_ACCOUNT_B64 CLIENT_SECRET_B64 GOOGLE_TOKEN_B64 GOOGLE_SHEETS_ID; do
            if [ -n "${!var}" ]; then
              echo "  ✅ $var 설정됨 (${#!var} chars)"
            else
              echo "  ❌ $var 미설정 — GitHub Secrets 확인 필요"
            fi
          done

          # 네트워크 연결 확인
          echo "── 네트워크 상태:"
          if curl -s --max-time 5 https://oauth2.googleapis.com > /dev/null; then
            echo "  ✅ oauth2.googleapis.com 접근 가능"
          else
            echo "  ❌ oauth2.googleapis.com 접근 불가 — 네트워크 오류"
          fi
        env:
          SERVICE_ACCOUNT_B64: ${{ secrets.SERVICE_ACCOUNT_B64 }}
          CLIENT_SECRET_B64:   ${{ secrets.CLIENT_SECRET_B64 }}
          GOOGLE_TOKEN_B64:    ${{ secrets.GOOGLE_TOKEN_B64 }}
          GOOGLE_SHEETS_ID:    ${{ secrets.GOOGLE_SHEETS_ID }}

      # ── 실패 감지: 이슈 생성 ──────────────────────────────────────────────────
      - name: Notify on failure — GitHub Issue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 원인 분류
          CAUSE="알 수 없는 오류"
          if [ ! -f /tmp/soundstorm_creds/token.pickle ]; then
            CAUSE="GOOGLE_TOKEN_B64 Secret 누락 또는 base64 오류"
          elif [ ! -f /tmp/soundstorm_creds/service_account.json ]; then
            CAUSE="SERVICE_ACCOUNT_B64 Secret 누락 또는 base64 오류"
          else
            CAUSE="OAuth 토큰 만료 (refresh_token 소멸) 또는 네트워크 오류"
          fi

          EXISTING=$(gh issue list \
            --repo ${{ github.repository }} \
            --label "sync-failure" \
            --state open --limit 1 --json number \
            --jq '.[0].number // empty')
          if [ -z "$EXISTING" ]; then
            gh issue create \
              --repo ${{ github.repository }} \
              --title "❌ YouTube Sync 실패 — $(date -u '+%Y-%m-%d %H:%M UTC')" \
              --body "## 원인 분류
          **추정 원인**: $CAUSE

          ## 즉시 조치 (3분)
          \`\`\`bash
          # 1. 로컬에서 브라우저 로그인으로 토큰 갱신
          python 07_AUTOMATION_자동화/scripts_스크립트/api_data_shuttler.py

          # 2. Secret 자동 업데이트 (REPO_PAT 설정 시)
          python 07_AUTOMATION_자동화/scripts_스크립트/export_secrets.py --push

          # 또는 수동 업데이트
          python 07_AUTOMATION_자동화/scripts_스크립트/export_secrets.py
          # → 출력된 GOOGLE_TOKEN_B64 값을 GitHub Secrets에 붙여넣기
          \`\`\`

          ## 영구 예방
          \`REPO_PAT\` Secret 등록 시 다음부터 토큰 갱신이 자동화됩니다.

          **Run ID**: ${{ github.run_id }}
          **Triggered by**: ${{ github.event_name }}" \
              --label "sync-failure"
          else
            gh issue comment "$EXISTING" \
              --repo ${{ github.repository }} \
              --body "🔁 재발 — Run ID: ${{ github.run_id }} ($(date -u '+%Y-%m-%d %H:%M UTC'))\n추정 원인: $CAUSE"
          fi

      - name: Notify on failure — Slack (선택)
        if: failure() && env.SLACK_WEBHOOK != ''
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK" \
            -H 'Content-type: application/json' \
            --data "{\"text\":\"❌ *YouTube Sync 실패* (3회 재시도 후)\n• Run: ${{ github.run_id }}\n• 조치: GOOGLE_TOKEN_B64 갱신 필요\"}"
