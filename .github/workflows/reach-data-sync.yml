name: Reach Data Sync (Studio CSV)

# CSV 다운로드는 로컬 Mac에서만 수행 (CDP Chrome 필요).
# 이 워크플로우는 아래 3가지 경우에 실행된다:
#   1) 로컬에서 CSV 다운로드 후 push
#   2) GitHub Actions cron (일 2회) — 최신 CSV 재처리 보장
#   3) 수동 workflow_dispatch
on:
  push:
    paths:
      - "07_AUTOMATION_자동화/youtube_exports/studio_reach_report.csv"
  schedule:
    - cron: "0 1 * * *"    # 10:00 KST — 로컬 다운로드 직후 재처리
    - cron: "0 13 * * *"   # 22:00 KST — 야간 재처리 (API 실패 복구)
  workflow_dispatch:

# 동시 실행 방지 — reach / youtube 워크플로우 간 _RawData_Master 동시 write 차단
# youtube-data-sync.yml과 동일 그룹 공유 → 순차 실행 보장
# cancel-in-progress: true — 중복 CSV push 시 이전 실행 취소 후 최신만 실행
concurrency:
  group: youtube-data-pipeline
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  ingest-reach-data:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r "07_AUTOMATION_자동화/requirements.txt"

      - name: Run Studio CSV Ingestor
        env:
          SERVICE_ACCOUNT_B64: ${{ secrets.SERVICE_ACCOUNT_B64 }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
        run: |
          python "07_AUTOMATION_자동화/scripts_스크립트/studio_csv_ingestor.py" --manual

      - name: Run Analytics Snapshot Engine
        continue-on-error: true  # 파일 미존재 시 워크플로우 실패 방지
        env:
          SERVICE_ACCOUNT_B64: ${{ secrets.SERVICE_ACCOUNT_B64 }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
        run: |
          python "07_AUTOMATION_자동화/engine/analytics_snapshot_engine.py"

      - name: Run API Data Shuttler (_VideoTraffic 동기화)
        continue-on-error: true  # VideoTraffic 실패가 전체 워크플로우 블록하지 않도록
        env:
          SERVICE_ACCOUNT_B64: ${{ secrets.SERVICE_ACCOUNT_B64 }}
          CLIENT_SECRET_B64:   ${{ secrets.CLIENT_SECRET_B64 }}
          GOOGLE_TOKEN_B64:    ${{ secrets.GOOGLE_TOKEN_B64 }}
          GOOGLE_SHEETS_ID:    ${{ secrets.GOOGLE_SHEETS_ID }}
        run: |
          python "07_AUTOMATION_자동화/scripts_스크립트/api_data_shuttler.py"
